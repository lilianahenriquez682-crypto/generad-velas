<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Automático</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #8B4513;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>🚀 Generador Automático</h1>
    <input type="text" id="link" placeholder="Pega el LINK de tu encuesta aquí">
    <button onclick="hacerTodo()">🚀INICIAR (rellena y envía automáticamente)</button>
    <div id="status"></div>

    <script type="text/javascript">
        emailjs.init("miHQ7cMDRJ1p9YaB2");

        async function hacerTodo() {
            const link = document.getElementById('link').value;
            const status = document.getElementById('status');
            
            if (!link) {
                alert("Pega el link primero!");
                return;
            }

            status.innerHTML = "⏳ Cargando link: " + link;

            // Abrir link
            const popup = window.open(link, 'Encuesta', 'width=800,height=600');
            
            // Esperar que cargue
            await new Promise(r => setTimeout(r, 3000));

            // Rellenar y enviar 50 veces
            for (let i = 1; i <= 50; i++) {
                status.innerHTML = `🔄 Rellenando encuesta ${i}/50...`;
                
                // Rellenar datos
                const datos = {
                    nombre: "Cliente " + i,
                    edad: Math.floor(Math.random() * 50) + 18,
                    genero: ["Femenino", "Masculino", "Otro"][Math.floor(Math.random() * 3)],
                    precio: ["$10-$15", "$15-$20", "$20-$25"][Math.floor(Math.random() * 3)],
                    frecuencia: ["1 vez/mes", "2-3 veces/mes", "1 vez/semana"][Math.floor(Math.random() * 3)],
                    aroma: ["Lavanda", "Vainilla", "Coco"][Math.floor(Math.random() * 3)],
                    tamaño: ["Pequeño", "Mediano", "Grande"][Math.floor(Math.random() * 3)],
                    uso: ["Decoración", "Relajación", "Regalo"][Math.floor(Math.random() * 3)],
                    diseño: ["Sí", "No"][Math.floor(Math.random() * 2)],
                    online: ["Sí", "Quizás", "No"][Math.floor(Math.random() * 3)]
                };

                // Enviar
                await emailjs.send('service_xfo7y7f', 'template_qcb2q9m', datos);
                
                status.innerHTML = `✅ Encuesta ${i}/50 enviada!`;
                
                await new Promise(r => setTimeout(r, 1000));
            }

            popup.close();
            status.innerHTML = "✅ ¡COMPLETADO! 50 encuestas enviadas!";
            alert("✅ 50 encuestas enviadas!");
        }
    </script>
</body>
</html>
