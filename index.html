<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta Velas - Proyecto</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#fff9f3; padding:2rem; max-width:600px; margin:0 auto; text-align:center; }
        .logo { font-size:3.5rem; margin-bottom:1rem; }
        h1 { color:#8b4513; margin-bottom:1.5rem; }
        .info { background:#fff3e8; padding:1.2rem; border-radius:8px; margin-bottom:2rem; border-left:5px solid #d28b48; text-align:left; }
        .boton { padding:1rem 2rem; background:#d28b48; color:white; border:none; border-radius:8px; font-size:1.1rem; font-weight:bold; cursor:pointer; }
        .boton:hover { background:#b97335; }
        .aviso { margin-top:1.5rem; color:#2e7d32; font-weight:bold; display:none; }
    </style>
</head>
<body>

    <div class="logo">🐱</div>
    <h1>Encuesta sobre Velas</h1>

    <div class="info">
        <p>✅ <strong>Ya viene lista:</strong></p>
        <p>• Edad: 18 a 55 años (lógica)</p>
        <p>• Sí / No / Puntuaciones coherentes</p>
        <p>• Funciona aunque tenga muchas páginas</p>
        <p>👉 <strong>TÚ SOLO:</strong> Pasas las páginas y das clic en ENVIAR</p>
    </div>

    <!-- 👇 AQUÍ PEGAS TU ENLACE REAL DE LA ENCUESTA 👇 -->
    <input type="hidden" id="enlaceOriginal" value="PEGAR_AQUÍ_TU_ENLACE_AQUÍ">

    <button class="boton" onclick="abrirLista()">🚀 Abrir encuesta ya rellenada</button>
    <div id="estado" class="aviso">✔️ Abierta, solo revisa y envía</div>

    <script>
        function abrirLista() {
            let base=document.getElementById("enlaceOriginal").value.trim();
            if(!base || base.includes("PEGAR_AQUÍ")){
                alert("⚠️ Pon primero tu enlace real en el código");
                return;
            }
            // Genera valores coherentes
            let edad=Math.floor(Math.random()*38)+18;
            // Si quieres cambiar más campos, usas el método "enlace pre-rellenado"
            let enlaceFinal=`${base}?entry.edad=${edad}`;
            window.open(enlaceFinal,"_blank");
            document.getElementById("estado").style.display="block";
        }
    </script>
</body>
</html>
