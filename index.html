<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta Velas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #fff9f3; padding: 2rem; max-width: 620px; margin: 0 auto; text-align: center; }
        .logo { font-size: 3.5rem; margin-bottom: 1rem; }
        h1 { color: #8b4513; margin-bottom: 1.2rem; }
        .info { background: #fff3e8; padding: 1.2rem; border-radius: 8px; margin-bottom: 2rem; border-left: 5px solid #d28b48; text-align: left; }
        .boton { display: block; margin: 0.9rem auto; padding: 1.1rem; width: 96%; background: #d28b48; color: white; border: none; border-radius: 8px; font-size: 1.15rem; font-weight: bold; cursor: pointer; }
        .boton:hover { background: #b97335; }
    </style>
</head>
<body>
    <div class="logo">🐱</div>
    <h1>📊 Encuesta sobre Velas Aromáticas</h1>

    <div class="info">
        <p><strong>✅ Funcionamiento:</strong></p>
        <p>• Ya tiene tu enlace oficial puesto</p>
        <p>• Marca automáticamente: <strong>Sí</strong> + Edad 18-55 + Puntuaciones 3-5</p>
        <p>• TÚ SOLO: Clic en <strong>Continuar</strong> → al final <strong>Enviar</strong></p>
        <p>• Cada botón = respuesta diferente</p>
    </div>

    <!-- 👇 TU ENLACE YA ESTÁ AQUÍ, NO CAMBIES NADA 👇 -->
    <input type="hidden" id="enlaceUnico" value="https://lilianahenriquez682-crypto.github.io/encuesta-velas">

    <button class="boton" onclick="generar()">🔹 Respuesta 1</button>
    <button class="boton" onclick="generar()">🔹 Respuesta 2</button>
    <button class="boton" onclick="generar()">🔹 Respuesta 3</button>
    <button class="boton" onclick="generar()">🔹 Respuesta 4</button>
    <button class="boton" onclick="generar()">🔹 Respuesta 5</button>
    <button class="boton" onclick="generar()">🔹 Respuesta 6</button>
    <button class="boton" onclick="generar()">🔹 Respuesta 7</button>
    <button class="boton" onclick="generar()">🔹 Respuesta 8</button>
    <button class="boton" onclick="generar()">🔹 Respuesta 9</button>
    <button class="boton" onclick="generar()">🔹 Respuesta 10</button>

    <script>
        function generar() {
            const enlace = document.getElementById("enlaceUnico").value.trim();
            // Datos ajustados exactos a tu encuesta
            const edad = Math.floor(Math.random() * 38) + 18;
            const compro = "Sí";
            const nota1 = Math.floor(Math.random() * 3) + 3;
            const nota2 = Math.floor(Math.random() * 3) + 3;
            const nota3 = Math.floor(Math.random() * 3) + 3;
            const nota4 = Math.floor(Math.random() * 3) + 3;

            // Abre la encuesta con todo listo
            window.open(`${enlace}?f1=${compro}&c1=${edad}&q1=${nota1}&q2=${nota2}&q3=${nota3}&q4=${nota4}`, "_blank");
        }
    </script>
</body>
</html>
